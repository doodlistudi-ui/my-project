<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제휴 문의</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .form-container {
      background: #fff;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 1.6rem;
      margin-bottom: 8px;
      color: #111;
    }
    p.subtitle {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 28px;
    }
    .field {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111;
      transition: border-color 0.2s;
      background: #fafafa;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #4f46e5;
      background: #fff;
    }
    textarea { resize: vertical; min-height: 120px; }
    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    button[type="submit"]:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="form-container">
    <h1>제휴 문의</h1>
    <p class="subtitle">파트너십 및 제휴 관련 문의를 남겨주시면 빠르게 답변드리겠습니다.</p>

    <form action="https://formspree.io/f/mjgpdgva" method="POST">
      <div class="field">
        <label for="company">회사명 / 기관명</label>
        <input type="text" id="company" name="company" placeholder="예) 홍길동 주식회사" required>
      </div>
      <div class="field">
        <label for="name">담당자 이름</label>
        <input type="text" id="name" name="name" placeholder="이름을 입력해주세요" required>
      </div>
      <div class="field">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="example@company.com" required>
      </div>
      <div class="field">
        <label for="phone">연락처</label>
        <input type="tel" id="phone" name="phone" placeholder="010-0000-0000">
      </div>
      <div class="field">
        <label for="type">제휴 유형</label>
        <select id="type" name="type">
          <option value="">선택해주세요</option>
          <option value="마케팅">마케팅 제휴</option>
          <option value="콘텐츠">콘텐츠 제휴</option>
          <option value="기술">기술 제휴</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="field">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" placeholder="제휴 목적 및 내용을 간략히 설명해주세요" required></textarea>
      </div>
      <button type="submit">문의 보내기</button>
    </form>
  </div>
</body>
</html>
