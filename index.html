<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>두들리아트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 48px 20px 32px;
      border-bottom: 1px solid #f0f0f0;
    }
    .logo img {
      height: 36px;
      width: auto;
    }

    .hero {
      text-align: center;
      padding: 44px 20px 32px;
    }
    .hero p {
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 6px;
    }
    .hero h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .menu {
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      padding: 0 20px 60px;
      flex: 1;
    }

    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 20px;
      border: 1px solid #ebebeb;
      border-radius: 14px;
      margin-bottom: 12px;
      text-decoration: none;
      color: #111;
      transition: background 0.15s, border-color 0.15s;
      cursor: pointer;
    }
    .menu-item:hover {
      background: #fafafa;
      border-color: #ddd;
    }
    .menu-item:active {
      background: #f5f5f5;
    }

    .menu-item-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .menu-icon {
      width: 42px;
      height: 42px;
      background: #f5f5f5;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .menu-text .title {
      font-size: 0.97rem;
      font-weight: 600;
      margin-bottom: 3px;
    }
    .menu-text .desc {
      font-size: 0.78rem;
      color: #999;
    }
    .arrow {
      color: #ccc;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.75rem;
      color: #ccc;
      border-top: 1px solid #f5f5f5;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="logo.png" alt="두들리아트">
    </div>
  </header>

  <div class="hero">
    <p>예약 신청</p>
    <h1>두들리아트 체험수업 예약</h1>
  </div>

  <div class="menu">
    <a href="form.html" class="menu-item">
      <div class="menu-item-left">
        <div class="menu-icon">✏️</div>
        <div class="menu-text">
          <div class="title">체험수업 신청</div>
          <div class="desc">무료 체험수업 신청서 작성</div>
        </div>
      </div>
      <div class="arrow">›</div>
    </a>
  </div>

  <footer>© 2026 두들리아트. All rights reserved.</footer>

</body>
</html>
